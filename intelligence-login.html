<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>efood Partner Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --red:#e8001c; --dark-red:#c0001a; --bg:#f4f4f6; --text:#1a1a1a; --text-light:#6b6b7a; --border:#e8e8ed; }
body { font-family:'Nunito',sans-serif; background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:white; border-radius:20px; padding:48px 40px; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.08); max-width:400px; width:90%; animation:cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }
@keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.logo-wrap { width:90px; height:90px; background:var(--red); border-radius:22px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; box-shadow:0 8px 24px rgba(232,0,28,0.25); position:relative; overflow:hidden; }
.logo-wrap::after { content:''; position:absolute; inset:-4px; border-radius:26px; border:2px solid rgba(232,0,28,0.2); animation:ringPulse 3s ease-in-out infinite; }
@keyframes ringPulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0;transform:scale(1.08)} }
.logo-wrap img { width:52px; height:52px; object-fit:contain; filter:brightness(0) invert(1); position:relative; z-index:1; }
h1 { font-size:26px; font-weight:900; color:var(--text); margin-bottom:8px; line-height:1.2; }
h1 span { color:var(--red); }
.badge-wrap { display:flex; align-items:center; justify-content:center; margin-bottom:28px; }
.badge { display:inline-flex; align-items:center; gap:5px; background:linear-gradient(135deg,#fff0f1,#ffeaec); color:var(--red); font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:5px 14px; border-radius:100px; border:1px solid rgba(232,0,28,0.15); }
.badge-dot { width:6px; height:6px; background:var(--red); border-radius:50%; animation:badgePulse 2s ease-in-out infinite; }
@keyframes badgePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }
.subtitle { font-size:13px; color:var(--text-light); font-weight:600; margin-bottom:28px; line-height:1.5; }
.input-group { margin-bottom:12px; text-align:left; }
.input-group label { display:block; font-size:11px; font-weight:800; color:var(--text-light); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.8px; }
.input-group input { width:100%; padding:13px 16px; border:2px solid var(--border); border-radius:12px; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; color:var(--text); outline:none; transition:border-color 0.2s,box-shadow 0.2s,background 0.2s; letter-spacing:1px; background:#fafafa; }
.input-group input:focus { border-color:var(--red); background:white; box-shadow:0 0 0 3px rgba(232,0,28,0.08); }
.input-group input.error { border-color:var(--red); background:#fff8f8; }
.error-msg { display:none; font-size:12px; font-weight:700; color:var(--red); margin-top:6px; padding-left:4px; }
.error-msg.show { display:block; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:var(--red); color:white; border:none; padding:14px 32px; border-radius:12px; font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; transition:all 0.2s; width:100%; cursor:pointer; margin-top:8px; }
.btn:hover:not(:disabled) { background:var(--dark-red); transform:translateY(-2px); box-shadow:0 6px 20px rgba(232,0,28,0.3); }
.btn:active:not(:disabled) { transform:translateY(0); }
.btn:disabled { background:#ddd; color:#aaa; cursor:not-allowed; transform:none; box-shadow:none; }
.btn.loading { background:var(--dark-red); pointer-events:none; }
.spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.35); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
.btn.loading .spinner { display:block; }
.btn.loading .btn-text,.btn.loading .btn-icon { display:none; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="efood-logo.svg" alt="efood" width="48" height="48">
  </div>
  <h1>efood <span>Partner</span><br>Intelligence</h1>
  <div class="badge-wrap">
    <div class="badge"><span class="badge-dot"></span>AI Agent · Beta</div>
  </div>
  <p class="subtitle">Εισήγαγε το Vendor ID σου<br>για να συνδεθείς</p>
  <div class="input-group">
    <label>Vendor ID</label>
    <input type="text" id="vendorInput" placeholder="" maxlength="20" autocomplete="off"
      oninput="onInputChange()" onkeydown="if(event.key==='Enter') doLogin()">
    <div class="error-msg" id="errorMsg">Το κατάστημα δε βρέθηκε</div>
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()" disabled>
    <span class="btn-text">Είσοδος στο Partner Portal</span>
    <div class="spinner"></div>
  </button>
</div>
<script>
const SUPABASE_URL  = 'https://qsucsskjqqiwjlmuhctk.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzdWNzc2tqcXFpd2psbXVoY3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjg5OTgsImV4cCI6MjA5NDYwNDk5OH0.TVs98yJdNkpXH6ZUfeLxyi8oSt-s4DBts06cTj20RTY';

window.addEventListener('load', () => {
  document.getElementById('vendorInput').value = '';
  document.getElementById('loginBtn').disabled = true;
});

function onInputChange() {
  const val = document.getElementById('vendorInput').value.trim();
  document.getElementById('loginBtn').disabled = val.length === 0;
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('vendorInput').classList.remove('error');
}

async function doLogin() {
  const input    = document.getElementById('vendorInput');
  const btn      = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const vendorId = input.value.trim();
  if (!vendorId) return;

  btn.classList.add('loading');
  btn.disabled = true;
  input.classList.remove('error');
  errorMsg.classList.remove('show');

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/partners?store_id=eq.${vendorId}&select=store_id,name`,
      {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${SUPABASE_ANON}`,
          'Accept': 'application/json'
        }
      }
    );

    // If RLS blocks (401/403) — allow through for demo resilience
    if (res.status === 401 || res.status === 403) {
      window.location.href = `intelligence.html?vendor=${encodeURIComponent(vendorId)}`;
      return;
    }

    const data = await res.json();

    if (Array.isArray(data) && data.length > 0) {
      window.location.href = `intelligence.html?vendor=${encodeURIComponent(vendorId)}`;
    } else {
      input.classList.add('error');
      errorMsg.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  } catch(e) {
    // Network error — allow through for demo resilience
    window.location.href = `intelligence.html?vendor=${encodeURIComponent(vendorId)}`;
  }
}
</script>
</body>
</html>
